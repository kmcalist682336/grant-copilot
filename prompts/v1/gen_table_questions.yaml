          use_when: "When you need the central tendency of household earnings in an area."
          universe_plain: "Private households (excludes group quarters)."
          subject_area: "Economics/Income"
          measure_type: "currency"
          sibling_tables:
            - {table_id: "B19049", description: "Median Household Income by Age of Householder"}
            - {table_id: "B22008", description: "Median Income by SNAP Receipt"}
            - {table_id: "S1901", description: "Income (subject table)"}
    output:
      tables:
        - table_id: "B19013"
          dataset: "acs/acs5"
          positive:
            - "how much do typical households around here actually make"
            - "what's the median household income in this area"
            - "what do families in my neighborhood earn"
