# Gold-standard query set for the Census chatbot intent resolver.
#
# 100 entries. Mix designed for Atlanta-heavy POC usage:
#   SCOPE        → city_atlanta (50)  metro_atlanta (25)  broader (25)
#   DIFFICULTY   → easy (30)  medium (40)  hard (30)
#
# FIELDS
# ------
# query           — literal user input
# category        — reference-type bucket (see README-style reference below)
# scope           — city_atlanta | metro_atlanta | broader
# difficulty      — easy | medium | hard
# session_context — prior session state ({} for clean runs)
# expected:
#   intent_type      — exact | proximity | comparison | context
#   comparison_implied           — bool (default false)
#   national_comparison_implied  — bool (default false)
#   geo_refs[]       — list of ExtractedGeoRef subsets to match
#   compounds        — list of CompoundSpec subsets (optional)
#   resolved[]       — list of ResolvedGeography summary dicts, each with:
#                        display_name_substring  (case-insensitive match)
#                        geo_level               (exact)
#                        geo_type                (optional; null = skip check)
#                        tract_count_range       [lo, hi] or null
#                        min_confidence          (0-1)
#   clarification_required — bool (ambiguous cases)
#   acceptable_options     — list of display_name substrings any of which pass
#
# When reviewing: see the "gold_review_guide" notes we discussed — check
# ref_type, qualifier, proximity_tier, scope_hint, tract_count_range, and
# min_confidence tier (>=0.95 silent, 0.80-0.95 w/ note, 0.50-0.80 choose,
# <0.50 open-ended clarification).

