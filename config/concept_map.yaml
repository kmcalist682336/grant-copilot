# Tier 1 curated concept → Census table map.
#
# This is the fast path between Tier 0 (query expansion) and Tier 2
# (FTS metadata search). Each entry encodes one ACS concept that users
# ask about often enough to skip both LLM and FTS scoring.
#
# Schema (see scripts/chatbot/concept_map.py):
#   - canonical:    verbatim name shown to users in citations
#   - aliases:      alternate phrasings the lookup matches against
#   - table_id:     Census detailed-table ID (e.g., B19013) — base
#   - dataset:      defaults to acs/acs5 — broadest geographic coverage
#   - variables:    one of:
#                     value:           single estimate variable
#                     numerator + denominator (numerator may be a list)
#                     components:      breakdown variables
#   - by_geo_level: optional sparse overrides per geo level (tract,
#                   county, msa, state). Each override may change any of
#                   table_id / dataset / variables; unset fields inherit.
#                   Common pattern: switch dataset to acs/acs1 at MSA +
#                   state where currency matters and the sample is large
#                   enough to be reliable.
#   - units:        dollars | percent | count | years | minutes | index | ratio
#   - notes:        short usage hint
#
# Every entry is verified at load time against the coverage table — its
# effective (table, dataset) at every required geo_level must have at
# least one year with successful coverage. See:
#   tools/import_v1_coverage.py     — pulls v1 stage8 results
#   tools/probe_msa_coverage.py     — fills MSA gaps via live probes
#
# Curated by Opus 4.7; spot-reviewed by maintainer.

