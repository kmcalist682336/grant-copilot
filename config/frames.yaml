      - "year structure built"
      - "median monthly housing costs"
    rhetorical_target: "Energy-burden case: heating-fuel mix + old stock + income-constrained households."
    standard_caveats:
      - "ACS does not report utility bills directly; burden is inferred from monthly housing costs + income."

  - name: senior_housing
    description: |
      Senior housing production, age-in-place supports, aging-
      friendly neighborhoods.
    triggers:
      - "senior housing"
      - "aging in place"
      - "older adult housing"
