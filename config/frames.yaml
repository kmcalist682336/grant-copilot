      - "child poverty rate"
      - "seniors in poverty"
      - "employment by sex by age"
    rhetorical_target: "Age-cohort disparity: metric broken out by age + life-stage narrative."
    standard_caveats:
      - "Age cohorts of interest often require 5-year data for acceptable MOEs at small geographies."

  - name: gender_disparity
