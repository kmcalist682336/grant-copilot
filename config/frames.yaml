# Curated grant-narrative frames.
#
# Each frame is a rhetorical structure the synthesizer should target
# when the GrantFrameMatcher classifies a query into it. The frame
# also tells the Expander which *other* concepts to fetch beyond the
# one(s) the user explicitly asked about — a food-access case needs
# vehicle access and SNAP data whether or not the user asked for them.
#
# Fields:
#   name: frame ID (stable; referenced from code)
#   description: one-line; shown to the LLM in the classifier prompt
#   triggers: phrases / concepts that commonly indicate this frame
#   required_additional_concepts: canonical concept names the Expander
#     should add when this frame fires. Must appear in concept_map.yaml
#     OR be resolvable by the semantic router (frame can name proxies
#     the cmap doesn't have; those go through normal routing).
#   rhetorical_target: short hint passed to the synthesizer — what
#     shape should the final prose take?
#   standard_caveats: frame-level caveats to always surface
#
# "specific_lookup" is the default when no narrative frame fits.
# "other" is the catch-all for queries that don't match any frame.

frames:
  - name: specific_lookup
    description: |
      A user wants a specific number (a value or a small set of
      related numbers). No grant narrative implied. Example: "what is
      the median income in Buckhead" or "uninsured rate in Atlanta".
    triggers:
      - "what is / what's"
      - "how many / how much"
      - direct single-concept questions
    required_additional_concepts: []
    rhetorical_target: "One-paragraph answer stating the value with context (year, geo, caveats). No narrative arc."
    standard_caveats: []

  - name: demographic_snapshot
    description: |
      User asks for a demographic profile of a geography, often to open
      a grant with context ("tell me about X", "demographic snapshot").
      No specific metric pinned — the synthesizer should assemble a
      composite picture.
    triggers:
      - "tell me about"
      - "demographic snapshot of"
      - "profile of"
      - "overview of"
      - "what does X look like"
    required_additional_concepts:
      - "total population"
      - "median household income"
      - "poverty rate"
      - "racial composition"
      - "bachelor's degree or higher"
      - "median age"
    rhetorical_target: "Opening paragraph suitable for a grant introduction — paint the demographic picture of the area."
    standard_caveats:
      - "Figures are ACS 5-year estimates; small-area values carry meaningful margins of error."

  - name: food_access
    description: |
      User is making or supporting a case for food access / food pantry /
      nutrition programming. Key proxies: SNAP, poverty, vehicle access,
      child food insecurity.
    triggers:
      - "food pantry"
      - "food bank"
      - "food banks"
      - "food access"
      - "food insecurity"
      - "food desert"
      - "grocery access"
      - "hunger"
      - "hungry"
      - "SNAP / food stamps"
      - "nutrition program"
      - "meal program"
      - "feeding program"
    required_additional_concepts:
      - "SNAP participation rate"
      - "poverty rate"
      - "share without a vehicle"
      - "child poverty rate"
      - "median household income"
    rhetorical_target: "Build a food-access case: poverty + SNAP participation + grocery access constraints (vehicle)."
    standard_caveats:
      - "Census data approximates food-access conditions; direct food-insecurity measures come from USDA ERS / Feeding America."

  - name: housing_instability
    description: |
      User is building a housing / rent burden / affordable-housing
      case. Focus on cost burden, tenure, affordability, crowding.
    triggers:
      - "rent burden"
      - "housing instability"
      - "affordable housing"
      - "cost burden"
      - "housing stress"
    required_additional_concepts:
      - "rent burden"
      - "homeownership rate"
      - "median gross rent"
      - "median household income"
      - "poverty rate"
    rhetorical_target: "Housing-instability case: cost-burden rate + tenure mix + income vs rent + disparity."
    standard_caveats:
      - "Rent and cost-burden data reflect 5-year ACS averages; they lag current conditions by up to 3 years."

  - name: displacement
    description: |
      User is building a displacement / gentrification narrative. Key
      signals are rising rents, changing racial composition, income
      shifts.
    triggers:
      - "displacement"
      - "gentrification"
      - "neighborhood change"
      - "being priced out"
    required_additional_concepts:
      - "median gross rent"
      - "median household income"
      - "racial composition"
      - "homeownership rate"
      - "population change"
    rhetorical_target: "Displacement narrative: year-over-year shifts in rent + racial composition + tenure over the trend window."
    standard_caveats:
      - "Displacement is inferred from Census snapshots; causation requires longitudinal analysis beyond ACS."

  - name: workforce_gap
    description: |
      User is building a workforce development / job training case.
      Key proxies: unemployment, educational attainment, NEET youth,
      sectoral employment.
    triggers:
      - "workforce"
      - "job training"
      - "employment"
      - "disconnected youth / NEET"
      - "sectoral / trades"
    required_additional_concepts:
      - "unemployment rate"
      - "bachelor's degree or higher"
      - "median household income"
      - "poverty rate"
      - "share of youth not in school or employed"
    rhetorical_target: "Workforce case: unemployment + attainment + disconnected-youth share + income."
    standard_caveats:
      - "ACS employment data is self-reported and reflects the 5-year survey window."

  - name: senior_isolation
    description: |
      User is building a case for senior services (isolation, aging,
      senior centers, 65+ support programs).
    triggers:
      - "senior services"
      - "senior center"
      - "aging"
      - "isolation"
      - "older adults"
      - "65+ / elderly"
    required_additional_concepts:
      - "share 65 and over"
      - "seniors living alone"
      - "seniors in poverty"
      - "share without a vehicle"
      - "broadband subscription rate"
    rhetorical_target: "Senior-isolation case: 65+ population share + living-alone rate + vehicle access + broadband for remote-service reach."
    standard_caveats:
      - "Isolation is inferred from household composition and access indicators; direct measures of social isolation are not in ACS."

  - name: child_welfare
    description: |
      User is building a case for children's programs, child welfare,
      youth services. Focus on child poverty, single-parent
      households, uninsured children.
    triggers:
      - "children"
      - "child welfare / child poverty"
      - "youth program (non-workforce)"
      - "after-school"
      - "single-parent"
    required_additional_concepts:
      - "child poverty rate"
      - "share under 18"
      - "single-parent households"
      - "child uninsured rate"
      - "median household income"
    rhetorical_target: "Child-welfare case: child poverty + family structure + uninsured children + income context."
    standard_caveats:
      - "Small-area child-specific estimates have wide confidence intervals; cite MOE where material."

  - name: digital_divide
    description: |
      User is asking about broadband / computer access / digital
      equity. Usually ties to workforce or senior contexts but can
      stand alone.
    triggers:
      - "digital divide"
      - "broadband"
      - "computer access"
      - "internet access"
      - "digital equity"
    required_additional_concepts:
      - "broadband subscription rate"
      - "computer ownership rate"
      - "median household income"
      - "share 65 and over"
    rhetorical_target: "Digital-equity case: broadband subscription + device ownership + income + age composition."
    standard_caveats:
      - "ACS broadband measures subscription, not quality-of-service or speed; actual digital access may be lower."

  - name: immigrant_services
    description: |
      User is building a case for immigrant services (ESL, workforce
      for immigrants, integration programs).
    triggers:
      - "immigrant"
      - "foreign-born"
      - "refugee"
      - "ESL"
      - "linguistic isolation"
    required_additional_concepts:
      - "foreign-born share"
      - "limited English-speaking households"
      - "share of Hispanic or Latino population"
      - "median household income"
      - "bachelor's degree or higher"
    rhetorical_target: "Immigrant-services case: foreign-born share + linguistic isolation + educational attainment + income."
    standard_caveats:
      - "Foreign-born status and linguistic isolation are self-reported; undercount is well documented."

  - name: transit_access
    description: |
      User is building a transit / mobility case. Focus on vehicle
      access, commute, work-from-home.
    triggers:
      - "transit"
      - "mobility"
      - "commute"
      - "no-vehicle households"
      - "work from home"
    required_additional_concepts:
      - "share without a vehicle"
      - "commute mode"
      - "share working from home"
      - "median household income"
      - "poverty rate"
    rhetorical_target: "Transit-access case: no-vehicle rate + commute mode mix + income context."
    standard_caveats:
      - "Commute-mode data reflects pre-pandemic norms in 5-year windows covering 2019-2023 or earlier."

  - name: mental_health
    description: |
      User is building a case for mental-health services. ACS has
      limited direct mental-health measures; proxies include
      disability, poverty, isolation indicators.
    triggers:
      - "mental health"
      - "behavioral health"
      - "psychological / trauma"
    required_additional_concepts:
      - "disability rate"
      - "poverty rate"
      - "seniors living alone"
      - "uninsured rate"
      - "median household income"
    rhetorical_target: "Mental-health case: disability + poverty + isolation proxies + uninsured. Acknowledge ACS limitations."
    standard_caveats:
      - "ACS does not directly measure mental health; proxies (disability, isolation, uninsured) approximate service demand."

  # -------------------------------------------------------------------------
  # Expanded library of grant-narrative frames. Each has a rich trigger
  # list so the deterministic matcher short-circuits before hitting the
  # LLM classifier; required_additional_concepts reference real canonical
  # concepts from config/concept_map.yaml so Tier 1 hits stay clean.
  # -------------------------------------------------------------------------

  # === EDUCATION & YOUTH ===

  - name: early_childhood
    description: |
      Early childhood education, pre-K access, kindergarten readiness,
      childcare deserts. Proxies: young-child share, income,
      single-parent households, maternal labor force participation.
    triggers:
      - "early childhood"
      - "early learning"
      - "pre-k"
      - "pre-kindergarten"
      - "preschool"
      - "head start"
      - "childcare"
      - "child care"
      - "daycare"
      - "day care"
      - "kindergarten readiness"
      - "infant toddler"
      - "babies and toddlers"
    required_additional_concepts:
      - "children under 18"
      - "median household income"
      - "single-parent households"
      - "child poverty rate"
      - "labor force participation"
    rhetorical_target: "Early-childhood case: share of young children + working mothers + family income + single-parent pressure."
    standard_caveats:
      - "ACS reports children under 5 but not enrollment in specific early-childhood programs; program gaps are inferred from income + family structure."

  - name: k12_education_gap
    description: |
      K-12 achievement gap, public vs private enrollment, school
      funding equity, high-school completion at the community level.
    triggers:
      - "school enrollment"
      - "public school"
      - "private school"
      - "high school completion"
      - "high school dropout"
      - "education gap"
      - "school quality"
      - "k-12"
      - "k through 12"
      - "achievement gap"
      - "title i"
      - "free and reduced lunch"
    required_additional_concepts:
      - "school enrollment"
      - "public school enrollment"
      - "less than high school"
      - "child poverty rate"
      - "median household income"
    rhetorical_target: "K-12 equity case: enrollment patterns + attainment gaps + child poverty + income context."
    standard_caveats:
      - "Census does not measure school performance directly; achievement gap claims should cite NAEP or district data."

  - name: adult_education
    description: |
      Adult literacy, GED programs, basic-skills for workforce entry,
      English language learning for adults.
    triggers:
      - "adult education"
      - "adult literacy"
      - "ged"
      - "basic skills"
      - "adult learning"
      - "esl for adults"
      - "adult esol"
      - "high school equivalency"
    required_additional_concepts:
      - "less than high school"
      - "high school graduate or higher"
      - "limited English-speaking households"
      - "unemployment rate"
      - "median earnings"
    rhetorical_target: "Adult-education case: adults without HS diploma + earnings gap + LEP share."
    standard_caveats:
      - "ACS reports attainment, not enrollment in adult-ed programs — use state/local adult-ed agencies for program reach."

  - name: college_access
    description: |
      College access, first-generation students, scholarship programs,
      postsecondary enrollment gaps.
    triggers:
      - "college access"
      - "college attainment"
      - "first generation college"
      - "first-gen"
      - "scholarship"
      - "postsecondary"
      - "post-secondary"
      - "higher education"
      - "college completion"
      - "bachelor's attainment"
      - "community college"
    required_additional_concepts:
      - "bachelor's degree or higher"
      - "some college no degree"
      - "high school graduate or higher"
      - "median household income"
      - "child poverty rate"
    rhetorical_target: "College-access case: attainment ladder + income context + youth population."
    standard_caveats:
      - "ACS captures completed attainment, not enrollment or persistence; combine with IPEDS for institutional data."

  - name: youth_workforce
    description: |
      Workforce development targeting youth/young adults (16-24):
      disconnected youth (NEET), first jobs, apprenticeships, career
      and technical education.
    triggers:
      - "disconnected youth"
      - "opportunity youth"
      - "neet"
      - "youth unemployment"
      - "young adults not working"
      - "16-24"
      - "16 to 24"
      - "youth apprenticeship"
      - "career technical education"
      - "cte"
      - "summer jobs"
      - "first job"
    required_additional_concepts:
      - "school enrollment"
      - "employment by sex by age"
      - "less than high school"
      - "unemployment rate"
      - "median household income"
    rhetorical_target: "Youth-workforce case: disconnected-youth share (16-24 not in school or work) + income + attainment."
    standard_caveats:
      - "NEET share is inferred from ACS enrollment + employment tables; sample sizes are small at sub-county levels."

  - name: afterschool_programs
    description: |
      After-school programming, out-of-school time, enrichment for
      school-age children — usually framed around latchkey kids,
      working parents, achievement support.
    triggers:
      - "afterschool"
      - "after-school"
      - "after school program"
      - "out-of-school time"
      - "ost"
      - "latchkey"
      - "youth enrichment"
      - "summer program"
      - "summer learning loss"
    required_additional_concepts:
      - "children under 18"
      - "single-parent households"
      - "labor force participation"
      - "child poverty rate"
      - "median household income"
    rhetorical_target: "After-school case: school-age population + working parents (labor force) + family income pressure."
    standard_caveats:
      - "ACS does not measure after-school program availability; need inferred from demographics and working-parent proxies."

  # === HEALTH & HEALTHCARE ===

  - name: healthcare_access
    description: |
      Primary care access, community health clinics, uninsured rate,
      clinic deserts. Proxies: uninsured, poverty, public insurance.
    triggers:
      - "healthcare access"
      - "health care access"
      - "primary care"
      - "community health"
      - "fqhc"
      - "clinic access"
      - "clinic desert"
      - "health center"
      - "doctor shortage"
      - "medical care"
      - "health disparity"
      - "health equity"
    required_additional_concepts:
      - "uninsured rate"
      - "public health insurance"
      - "poverty rate"
      - "median household income"
      - "disability status"
    rhetorical_target: "Healthcare-access case: uninsured + public-coverage share + poverty + disability context."
    standard_caveats:
      - "Coverage isn't the same as access; actual utilization depends on provider supply and transportation."

  - name: maternal_health
    description: |
      Maternal and infant health, OB/GYN access, home visiting
      programs, birth outcomes (Census proxies limited).
    triggers:
      - "maternal health"
      - "maternal mortality"
      - "infant mortality"
      - "prenatal"
      - "postpartum"
      - "home visiting"
      - "ob gyn"
      - "birth outcomes"
      - "new moms"
      - "pregnancy"
      - "teen pregnancy"
    required_additional_concepts:
      - "women who had a birth"
      - "fertility by age"
      - "uninsured rate"
      - "poverty rate"
      - "single-parent households"
    rhetorical_target: "Maternal-health case: recent-birth rate + young-mom share + insurance + poverty."
    standard_caveats:
      - "ACS reports fertility and births in the last 12 months; actual birth outcomes come from CDC WONDER or state vital stats."

  - name: disability_services
    description: |
      Disability services, accessibility programs, independent-living
      support. Proxies: ACS disability items (ambulatory, cognitive,
      self-care, independent living, hearing, vision).
    triggers:
      - "disability services"
      - "accessibility"
      - "adaptive"
      - "people with disabilities"
      - "ambulatory"
      - "cognitive disability"
      - "hearing impairment"
      - "vision impairment"
      - "assistive technology"
      - "independent living"
      - "ada compliance"
    required_additional_concepts:
      - "disability status"
      - "ambulatory difficulty"
      - "independent living difficulty"
      - "poverty rate"
      - "median household income"
    rhetorical_target: "Disability-services case: disability prevalence + specific functional limitations + poverty context."
    standard_caveats:
      - "ACS disability items are self-reported and capture 6 functional domains only; clinical definitions differ."

  - name: veterans_services
    description: |
      Veteran-focused services: employment, housing, mental health,
      physical disability among veterans.
    triggers:
      - "veteran"
      - "veterans services"
      - "veterans affairs"
      - "va benefits"
      - "military"
      - "post-9/11 vet"
      - "gulf war"
      - "veteran homelessness"
    required_additional_concepts:
      - "veterans"
      - "disability status"
      - "unemployment rate"
      - "median earnings"
      - "poverty rate"
    rhetorical_target: "Veterans case: veteran share + veteran-specific disability and economic indicators."
    standard_caveats:
      - "ACS veteran status is self-reported; service-era detail uses the 5-year file."

  - name: uninsured_coverage
    description: |
      Insurance-coverage gaps, Medicaid/Medicare enrollment pushes,
      navigator programs.
    triggers:
      - "uninsured"
      - "no health insurance"
      - "lacking insurance"
      - "medicaid"
      - "medicare"
      - "chip"
      - "aca marketplace"
      - "obamacare"
      - "insurance navigator"
      - "coverage gap"
      - "underinsured"
    required_additional_concepts:
      - "uninsured rate"
      - "public health insurance"
      - "private health insurance"
      - "poverty rate"
      - "median household income"
    rhetorical_target: "Coverage case: uninsured rate + public/private split + income context."
    standard_caveats:
      - "ACS distinguishes coverage type but not continuity; gaps during the year are under-measured."

  # === HOUSING (beyond existing frames) ===

  - name: homelessness_risk
    description: |
      Homelessness prevention, emergency rental assistance, risk
      indicators for housing loss. Proxies: severe rent burden,
      single-parent low-income, eviction-adjacent signals.
    triggers:
      - "homeless"
      - "homelessness"
      - "housing first"
      - "eviction"
      - "rent arrears"
      - "shelter capacity"
      - "housing loss"
      - "rapid rehousing"
      - "housing risk"
      - "at risk of homelessness"
    required_additional_concepts:
      - "severe rent burden"
      - "rent burden"
      - "poverty rate"
      - "single-parent households"
      - "median gross rent"
    rhetorical_target: "Homelessness-risk case: severe rent burden + deep poverty + precarious family structure."
    standard_caveats:
      - "ACS doesn't measure literal homelessness; HUD PIT counts and state HMIS are the source-of-truth. Use ACS only for at-risk population sizing."

  - name: homeownership_gap
    description: |
      First-time homebuyer programs, down-payment assistance,
      closing the racial homeownership gap.
    triggers:
      - "homeownership"
      - "first-time homebuyer"
      - "first time buyer"
      - "down payment assistance"
      - "homeownership gap"
      - "racial homeownership gap"
      - "closing costs"
      - "mortgage assistance"
    required_additional_concepts:
      - "homeownership rate"
      - "median home value"
      - "median household income"
      - "mortgage status"
      - "racial composition"
    rhetorical_target: "Homeownership-gap case: tenure by race + value + income affordability gap."
    standard_caveats:
      - "ACS homeownership is by householder race; gaps at small-area level have wide margins of error."

  - name: weatherization_rehab
    description: |
      Home weatherization, LIHEAP, energy efficiency, lead abatement,
      aging housing stock rehab.
    triggers:
      - "weatherization"
      - "liheap"
      - "energy efficiency"
      - "home rehab"
      - "housing rehab"
      - "lead abatement"
      - "old housing"
      - "housing stock"
