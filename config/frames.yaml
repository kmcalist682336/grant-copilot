  # === LOOK-IT-UP / NON-NARRATIVE QUERIES ===

  # (Pure trend_lookup / comparison_lookup frames were removed too:
  # their triggers like "has changed", "compare", "versus" overlap
  # with every topical grant narrative that naturally discusses
  # time-series or peer comparisons, so they were displacing the
  # more-useful topical frame match. The synthesizer already
  # detects multi-year + multi-geo plans via the planner and
  # frames the prose accordingly — no dedicated frame needed.)

  # (count_lookup, rate_calculation, and ranking_lookup frames were
  # considered and dropped: their triggers collided with "how many",
  # "what percent", and "top N" phrasings that topical frames like
  # early_childhood, child_welfare, and poverty also need. Since
  # those frames add zero required_additional_concepts, the net
  # effect of keeping them was wrong-frame matches without any
  # upside. specific_lookup already covers the generic-number-
  # lookup case via the LLM classifier when no topical frame fits.)

  # === DISPARITY & EQUITY FRAMES ===

  - name: racial_disparity
    description: |
      Racial-disparity narrative on any outcome: education, housing,
      health, employment. Expand with race-specific cuts.
    triggers:
      - "racial disparity"
      - "racial inequity"
      - "racial gap"
      - "by race"
      - "black versus white"
      - "black white gap"
      - "racial equity"
      - "racial justice"
    required_additional_concepts:
      - "racial composition"
      - "poverty rate black"
      - "poverty rate hispanic"
      - "median household income black"
      - "median household income white"
    rhetorical_target: "Racial-disparity case: race-specific indicator values + gap size + geographic context."
    standard_caveats:
      - "Race-disaggregated ACS estimates have wider MOEs; combine with 5-year data at small geographies."

  - name: age_disparity
    description: |
